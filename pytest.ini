[pytest]

# Diretório onde os testes estão localizados
testpaths = backend/tests

# Padrões de descoberta
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Adiciona backend ao PYTHONPATH
pythonpath = backend

# Opções padrão
addopts =
    -v
    --strict-markers
    -p no:warnings
    --tb=short
    --cov=backend/app
    --cov-report=term-missing
    --cov-report=xml
    --cov-report=html
    --cov-fail-under=85
    --junitxml=backend/tests/junit.xml

# Marcações futuras (preparação arquitetural)
markers =
    unit: Testes unitários rápidos
    integration: Testes de integração
    e2e: Testes ponta a ponta
