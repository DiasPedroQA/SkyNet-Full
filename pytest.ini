[pytest]
# Especifica onde o pytest deve procurar os testes
testpaths = backend/tests

# Padrão de nomes de arquivos de teste
python_files = test_*.py

# Padrão de classes de teste
python_classes = Test*

# Padrão de funções de teste
python_functions = test_*

# Adiciona o diretório backend ao PYTHONPATH
pythonpath = backend

# Opções adicionais
addopts =
    --strict-markers
    -p no:warnings
    --tb=short
