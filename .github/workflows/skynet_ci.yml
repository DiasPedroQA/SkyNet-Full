# .github/workflows/ci.yml

name: SkyNet CI

on:
    push:
        branches: [ "main", "develop" ]
    pull_request:
        branches: [ "main", "develop" ]

jobs:
    backend:
        name: 🐍 Backend - FastAPI
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: backend

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.11"
                cache: 'pip'
                cache-dependency-path: backend/requirements.txt

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt
                  pip install pytest pytest-cov ruff

            - name: Lint with Ruff
              run: ruff check .

            - name: Run tests with coverage
              run: pytest --cov=app --cov-report=term-missing --cov-report=xml

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v4
              with:
                file: ./backend/coverage.xml
                flags: backend
                token: ${{ secrets.CODECOV_TOKEN }}
              continue-on-error: true

    frontend:
        name: ⚛️ Frontend - React
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: frontend

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                node-version: "20"
                cache: 'npm'
                cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Run lint
              run: npm run lint
              continue-on-error: true

            - name: Run tests
              run: npm test -- --watchAll=false --coverage

            - name: Build
              run: npm run build

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v4
              with:
                  directory: ./frontend/coverage
                  flags: frontend
                  token: ${{ secrets.CODECOV_TOKEN }}
              continue-on-error: true

    # Job opcional para notificação
    notify:
        name: 📢 Notify
        needs: [backend, frontend]
        runs-on: ubuntu-latest
        if: always()

        steps:
            - name: Check status
              run: |
                  if [[ "${{ needs.backend.result }}" == "success" && "${{ needs.frontend.result }}" == "success" ]]; then
                      echo "✅ Todos os checks passaram!"
                  else
                      echo "❌ Alguns checks falharam!"
                      exit 1
                  fi
